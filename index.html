<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPro AI 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A0C10;--bg2:#0F1218;--card:#13161F;--border:#1C2030;--text:#E6E8EF;--text2:#9CA3AF;--text3:#6B7280;--v:#a78bfa;--c:#22d3ee;--ok:#10b981;--err:#ef4444;--warn:#f59e0b;--fire:#ff6b35;--gold:#fbbf24;--grad:linear-gradient(135deg,#ff6b35 0%,#f7931e 50%,#ffcc00 100%);--r:20px;--r2:28px}
html[data-theme="light"]{--bg:#f8fafc;--bg2:#f1f5f9;--card:#ffffff;--border:#e2e8f0;--text:#1e293b;--text2:#475569;--text3:#94a3b8}
html,body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
body{background:radial-gradient(ellipse at top,rgba(255,107,53,.08),transparent 50%),var(--bg)}
html[data-theme="light"] body{background:radial-gradient(ellipse at top,rgba(255,107,53,.05),transparent 50%),var(--bg)}
.app{max-width:1200px;margin:0 auto;padding:16px;min-height:100vh;position:relative;z-index:1}
.main-layout{display:grid;grid-template-columns:300px 1fr 300px;gap:16px;align-items:start}
.main-content{min-width:0}
.sidebar{position:sticky;top:16px;max-height:calc(100vh - 32px);overflow-y:auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:24px;margin-bottom:16px;transition:all .3s ease}
.card:hover{border-color:var(--fire);box-shadow:0 0 30px rgba(255,107,53,.15)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 28px;background:var(--grad);color:#fff;border:none;border-radius:var(--r);font-weight:700;font-size:15px;cursor:pointer;width:100%;font-family:inherit;transition:all .3s ease}
.btn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 0 30px rgba(255,107,53,.6)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-fire{background:var(--grad)!important;box-shadow:0 0 20px rgba(255,107,53,.5)}
.btn-o{background:transparent;border:2px solid var(--v);color:var(--v);box-shadow:none}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text2);box-shadow:none}
.btn-g:hover{background:var(--bg2);color:var(--text)}
.btn-s{padding:10px 18px;font-size:13px;width:auto;border-radius:14px}
.btn-ok{background:var(--ok)}
.btn-err{background:var(--err)}
.inp{width:100%;padding:14px 18px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);font-size:15px;color:var(--text);font-family:inherit;margin-bottom:16px;transition:all .3s ease}
.inp:focus{outline:none;border-color:var(--fire);box-shadow:0 0 0 4px rgba(255,107,53,.4)}
.chip{display:flex;align-items:center;gap:14px;padding:16px;background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);cursor:pointer;margin-bottom:12px;transition:all .3s ease}
.chip:hover{border-color:var(--fire);background:rgba(255,107,53,.06)}
.chip.sel{border-color:var(--fire);background:rgba(255,107,53,.12);box-shadow:0 0 0 3px rgba(139,92,246,.25)}
.chip input{margin:0;width:20px;height:20px;accent-color:var(--fire);pointer-events:none}
.prog{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:24px}
.prog-f{height:100%;background:var(--grad)!important;transition:width .5s ease}
.tabs{display:flex;gap:6px;padding:5px;background:var(--bg2);border-radius:var(--r);margin-bottom:20px;border:1px solid var(--border);overflow-x:auto}
.tab{flex:1;padding:12px 16px;text-align:center;cursor:pointer;border-radius:14px;font-weight:600;font-size:13px;color:var(--text2);white-space:nowrap;transition:all .3s ease}
.tab:hover{color:var(--text)}
.tab.on{background:var(--grad);color:#fff;box-shadow:0 0 20px rgba(255,107,53,.4)}
.hide{display:none!important}
.grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800}
.muted{color:var(--text3)}.sm{font-size:13px}.xs{font-size:11px}
.flex{display:flex}.ic{align-items:center}.jb{justify-content:space-between}.gap{gap:12px}
.center{text-align:center}
.streak{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:12px;font-weight:800}
.streak .f{font-size:18px}
.streak-fire{background:linear-gradient(135deg,rgba(255,107,53,.2),rgba(247,147,30,.2))!important;color:var(--fire)!important;border:1px solid var(--fire)!important;box-shadow:0 0 20px rgba(255,107,53,.4)}
.streak-fire .f{animation:fireFlicker .5s ease-in-out infinite}
@keyframes fireFlicker{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.day{border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;background:var(--bg2);transition:all .3s ease}
.day h4{color:var(--v);margin-bottom:14px;font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px}
.day-date{font-size:12px;color:var(--text3);font-weight:500}
.day.rest{opacity:.8;background:linear-gradient(135deg,rgba(16,185,129,.05),rgba(34,211,238,.05));border-color:var(--ok)}
.day.locked{opacity:.5;background:repeating-linear-gradient(45deg,var(--bg2),var(--bg2) 10px,rgba(107,114,128,.1) 10px,rgba(107,114,128,.1) 20px)}
.day.today{border-color:var(--fire)!important;border-width:2px;box-shadow:0 0 20px rgba(255,107,53,.4)}
.day.today h4::before{content:'🔥 '}
.day-actions{display:flex;gap:8px;margin-top:14px}
.day-actions .btn{flex:1}
.ex{padding:10px 0;border-bottom:1px dashed var(--border);font-size:14px}
.ex:last-child{border-bottom:none}
.ex-name{font-weight:600}
.ex-meta{color:var(--text2);font-size:13px;text-align:right}
.ex-meta strong{color:var(--fire)}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-left:6px;text-transform:uppercase}
.tag-c{background:rgba(255,107,53,.15);color:var(--fire)}
.tag-s{background:rgba(139,92,246,.15);color:var(--v)}
.meal{border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;background:var(--bg2);transition:all .3s ease}
.meal:hover{border-color:var(--fire);box-shadow:0 0 20px rgba(255,107,53,.15)}
.meal-name{font-weight:700;font-size:16px}
.meal-g{font-size:12px;color:var(--text3);background:var(--card);padding:4px 10px;border-radius:8px;margin-top:4px;display:inline-block}
.macros{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.pill{padding:6px 12px;border-radius:12px;font-size:12px;font-weight:600;border:1px solid}
.pill-k{background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(247,147,30,.15))!important;color:var(--fire)!important;border-color:var(--fire)!important}
.pill-p{background:rgba(34,211,238,.12);color:var(--c);border-color:rgba(34,211,238,.3)}
.pill-f{background:rgba(245,158,11,.12);color:var(--warn);border-color:rgba(245,158,11,.3)}
.pill-c{background:rgba(16,185,129,.12);color:var(--ok);border-color:rgba(16,185,129,.3)}
.meal-opt{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg);border:1.5px solid var(--border);border-radius:16px;cursor:pointer;margin-bottom:8px;transition:all .3s ease}
.meal-opt:hover{border-color:var(--fire);background:rgba(255,107,53,.05)}
.meal-opt.sel{border-color:var(--fire);background:rgba(255,107,53,.12);box-shadow:0 0 20px rgba(255,107,53,.3)}
.meal-opt input{margin:0;accent-color:var(--fire)}
.pw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:24px 0}
.pw-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:20px 14px;text-align:center;cursor:pointer;position:relative;transition:all .3s ease}
.pw-card:hover{border-color:var(--fire);transform:scale(1.05);box-shadow:0 0 30px rgba(255,107,53,.4)}
.pw-card.hit{grid-column:1/-1;background:linear-gradient(135deg,rgba(255,107,53,.2),rgba(247,147,30,.15),rgba(255,204,0,.1))!important;border:2px solid var(--fire)!important;box-shadow:0 0 30px rgba(255,107,53,.6),0 0 60px rgba(247,147,30,.4)!important}
.pw-card.hit::before{content:"🔥 HIT";position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:var(--grad);color:#fff;padding:6px 18px;font-size:12px;font-weight:800;border-radius:12px;box-shadow:0 0 20px rgba(255,107,53,.8);pointer-events:none;z-index:0}
.pw-n{font-weight:700;margin-bottom:10px;font-size:14px;color:var(--text2)}
.pw-c{font-size:28px;font-weight:900;color:#fff;margin:6px 0}
.pw-o{font-size:13px;color:var(--text3);text-decoration:line-through;margin-bottom:10px}
.pw-s{background:rgba(239,68,68,.15);color:var(--err);padding:5px 14px;border-radius:12px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:14px}
.pw-days{font-size:12px;color:var(--fire);margin-top:8px;font-weight:600}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:32px 28px;max-width:500px;width:100%;position:relative;box-shadow:0 0 50px rgba(255,107,53,.3);z-index:2001;max-height:90vh;overflow-y:auto}
.modal-x{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);cursor:pointer;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .3s ease}
.modal-x:hover{background:var(--fire);color:#fff;transform:rotate(90deg)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:linear-gradient(135deg,var(--card),rgba(255,107,53,.1));border:1px solid var(--fire);border-radius:16px;padding:14px 24px;z-index:3000;transition:all .3s ease;max-width:90%;display:flex;align-items:center;gap:12px;box-shadow:0 0 30px rgba(255,107,53,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-bottom:16px}
.user-pill{display:flex;align-items:center;gap:10px;background:var(--bg2);padding:6px 14px 6px 6px;border-radius:20px;border:1px solid var(--border);cursor:pointer;transition:all .3s ease}
.user-pill:hover{border-color:var(--fire);box-shadow:0 0 20px rgba(255,107,53,.3)}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;overflow:hidden}
.user-av img{width:100%;height:100%;object-fit:cover}
.metrics-container{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:20px 0}
.metric-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:center}
.metric-bar{height:40px;background:var(--grad);border-radius:10px;margin-bottom:10px;display:flex;align-items:center;justify-content:center}
.metric-value{font-size:24px;font-weight:900;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.metric-label{font-size:13px;color:var(--text2);margin-top:4px}
.calorie-banner{background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(247,147,30,.1));border:2px solid var(--fire);border-radius:var(--r);padding:24px;text-align:center;margin-bottom:20px}
.calorie-banner .label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.calorie-banner .value{font-size:48px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.calorie-banner .sub{font-size:14px;color:var(--text2);margin-top:8px}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.ach{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center;position:relative;transition:all .3s ease}
.ach.on{border-color:var(--fire);box-shadow:0 0 20px rgba(255,107,53,.5)}
.ach.off{opacity:.5;filter:grayscale(.7)}
.ach-i{font-size:32px;margin-bottom:8px;display:block}
.ach-t{font-weight:700;font-size:13px;margin-bottom:4px}
.ach-d{font-size:11px;color:var(--text3)}
.ach.on::after{content:"✓";position:absolute;top:8px;right:8px;background:var(--fire);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.water-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-top:12px}
.wg{aspect-ratio:1;background:var(--bg2);border:2px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all .3s ease}
.wg:hover{border-color:var(--c);transform:scale(1.1)}
.wg.on{background:linear-gradient(135deg,rgba(34,211,238,.3),rgba(59,130,246,.3));border-color:var(--c);box-shadow:0 0 15px rgba(34,211,238,.5)}
.wg.on::after{content:"💧"}
.cal-grid{display:grid;grid-template-columns:repeat(15,1fr);gap:4px;margin-top:12px}
.cd{aspect-ratio:1;background:var(--bg2);border-radius:4px;border:1px solid var(--border);transition:all .3s ease}
.cd:hover{transform:scale(1.2)}
.cd.on{background:var(--ok);border-color:var(--ok)}
.cd.today{border-color:var(--fire);border-width:2px}
.wo-pos-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.wo-pos-title{font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.wo-pos-title.start{color:var(--ok)}
.wo-pos-title.end{color:var(--fire)}
.wo-pos-text{font-size:14px;line-height:1.6;color:var(--text2)}
.yt-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.3);border-radius:12px;font-size:13px;font-weight:600;text-decoration:none;margin-top:8px;transition:all .3s ease}
.yt-btn:hover{background:rgba(239,68,68,.2);transform:scale(1.05)}
.profile-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;position:relative}
.profile-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.avatar-upload{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;cursor:pointer}
.profile-avatar:hover .avatar-upload{opacity:1}
.avatar-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.profile-info{flex:1}
.profile-name{font-size:18px;font-weight:700;margin-bottom:4px}
.profile-email{font-size:13px;color:var(--text3)}
.profile-achievements{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.profile-ach{width:28px;height:28px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:14px}
.edit-form{display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.edit-form.active{display:block}
.workout-mode{position:fixed;inset:0;background:var(--bg);z-index:5000;overflow-y:auto}
.workout-header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
.workout-title{font-size:18px;font-weight:700}
.workout-body{max-width:600px;margin:0 auto;padding:20px}
.workout-progress{margin-bottom:20px}
.workout-progress-text{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:8px}
.workout-exercise-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:24px;margin-bottom:20px}
.workout-exercise-name{font-size:24px;font-weight:800;margin-bottom:8px;text-align:center}
.workout-exercise-muscle{text-align:center;color:var(--text2);margin-bottom:20px}
.workout-exercise-params{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.workout-param{background:var(--bg2);padding:10px 16px;border-radius:12px;border:1px solid var(--border);min-width:80px;text-align:center}
.workout-param-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.workout-param-value{font-size:18px;font-weight:700;color:var(--fire);margin-top:2px}
.rest-timer{position:relative;width:220px;height:220px;margin:24px auto}
.rest-timer svg{transform:rotate(-90deg);width:100%;height:100%}
.rest-timer-bg{fill:none;stroke:var(--border);stroke-width:10}
.rest-timer-fg{fill:none;stroke:var(--grad);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.rest-timer-value{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rest-timer-num{font-size:48px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.rest-timer-label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
.rest-info-display{background:rgba(255,107,53,.1);border:1px solid var(--fire);border-radius:12px;padding:10px 16px;text-align:center;margin-bottom:16px}
.rest-info-display .label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.rest-info-display .value{font-size:16px;font-weight:700;color:var(--fire)}
.workout-actions{display:grid;gap:10px;margin-top:20px}
.workout-actions .btn{font-size:15px;padding:16px 20px}
.workout-complete{text-align:center;padding:40px 20px}
.workout-complete-icon{font-size:72px;margin-bottom:16px}
.workout-complete-title{font-size:28px;font-weight:900;margin-bottom:8px}
.workout-complete-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:24px 0}
.workout-stat{background:var(--bg2);padding:14px;border-radius:12px;border:1px solid var(--border)}
.workout-stat-value{font-size:22px;font-weight:800;color:var(--fire)}
.workout-stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.level-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.level-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.level-badge{display:flex;align-items:center;gap:8px}
.level-icon{width:40px;height:40px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;box-shadow:0 0 15px rgba(255,107,53,.5)}
.level-info{flex:1}
.level-name{font-weight:700;font-size:14px}
.level-xp{font-size:11px;color:var(--text3)}
.xp-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:8px}
.xp-bar-fill{height:100%;background:var(--grad);border-radius:4px;transition:width .5s ease}
.coins-display{display:flex;align-items:center;gap:8px;padding:8px 14px;background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.1));border:1px solid rgba(251,191,36,.3);border-radius:12px;font-weight:700;color:var(--gold)}
.coins-icon{font-size:18px}
.coach-card{background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(34,211,238,.05));border:1px solid rgba(139,92,246,.3);border-radius:var(--r);padding:20px;margin-bottom:16px}
.coach-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.coach-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--c));display:flex;align-items:center;justify-content:center;font-size:22px}
.coach-name{font-weight:700;font-size:15px}
.coach-subtitle{font-size:11px;color:var(--text3)}
.coach-tip{font-size:14px;line-height:1.6;color:var(--text2)}
.music-player{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.music-controls{display:flex;align-items:center;gap:12px;margin-top:16px}
.music-btn{width:48px;height:48px;border-radius:50%;background:var(--grad);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s ease}
.music-btn:hover{transform:scale(1.1);box-shadow:0 0 20px rgba(255,107,53,.5)}
.music-progress{flex:1;height:6px;background:var(--border);border-radius:3px;cursor:pointer;position:relative}

function getLevelInfo(xp){
  let current=LEVELS[0];let next=LEVELS[1];
  for(let i=0;i<LEVELS.length-1;i++){
    if(xp>=LEVELS[i].xp&&xp<LEVELS[i+1].xp){current=LEVELS[i];next=LEVELS[i+1];break}
    if(i===LEVELS.length-2&&xp>=LEVELS[i+1].xp){current=LEVELS[i+1];next={level:current.level+1,name:'Максимум',xp:Infinity,icon:'💎'}}
  }
  const xpInLevel=xp-current.xp;const xpNeeded=next.xp-current.xp;
  const progress=Math.min(100,(xpInLevel/xpNeeded)*100);
  return{current,next,xpInLevel,xpNeeded,progress};
}

function updateStreak(){
  if(!S.user)return;
  const today=new Date().toDateString();
  const last=S.user.lastWorkoutDate?new Date(S.user.lastWorkoutDate).toDateString():null;
  if(!S.user.workoutHistory)S.user.workoutHistory=[];
  if(!S.user.workoutHistory.find(h=>new Date(h.date).toDateString()===today)){
    const hour=new Date().getHours();
    S.user.workoutHistory.push({date:Date.now(),focus:'Тренировка',exercises:[]});
    if(S.user.workoutHistory.length>30)S.user.workoutHistory=S.user.workoutHistory.slice(-30);
    if(hour<8){S.user.earlyWorkouts=(S.user.earlyWorkouts||0)+1}
    if(hour>=21){S.user.lateWorkouts=(S.user.lateWorkouts||0)+1}
  }
  if(last!==today){
    if(last){const diff=Math.floor((new Date(today)-new Date(last))/DAY_MS);S.user.streak=(diff===1)?(S.user.streak||0)+1:1}
    else S.user.streak=1;
    S.user.lastWorkoutDate=today;
  }
  S.user.totalWorkouts=(S.user.totalWorkouts||0)+1;
  addXP(50);
  addCoins(50);
  save();
}

function addXP(amount){

  S.user.xp=(S.user.xp||0)+amount;

  }
}

function addCoins(amount){

}

function checkAch(){
  if(!S.user)return[];
  const unlocked=[];const prev=S.user.achievements||[];
  ACH.forEach(a=>{if(a.c(S.user)&&!prev.includes(a.id)){unlocked.push(a);addXP(a.xp);addCoins(a.coins)}});
  if(unlocked.length>0){S.user.achievements=[...prev,...unlocked.map(a=>a.id)];save()}
  return unlocked;
}

function getVisibleDays(u){
  const ts=u.trialStart||Date.now();const now=Date.now();
  const ds=Math.floor((now-ts)/DAY_MS);let fd=Math.max(0,7-ds);let sd=0;
  if(u.subscription){const sub=u.subscription;const sl=Math.max(0,Math.ceil((sub.unlockDate-now)/DAY_MS));if(sub.plan==='lifetime')return 30;if(sub.plan==='week')sd=sl;else return Math.min(30,sl)}

function getSubscriptionInfo(u){
  const ts=u.trialStart||Date.now();const now=Date.now();
  const ds=Math.floor((now-ts)/DAY_MS);const fl=Math.max(0,7-ds);
  let info={free:fl,paid:0,total:fl,type:'free',isLifetime:false};
  if(u.subscription){const sub=u.subscription;const sl=Math.max(0,Math.ceil((sub.unlockDate-now)/DAY_MS));

function genDayWorkout(dayOffset,qd){
  const a=qd||{};const pool=a.loc==='gym'?GYM:HOME;
  const foc=['Грудь, трицепс','Спина, бицепс','Ноги, ягодицы','Плечи, пресс','Фулбоди','Кардио + Кор','Всё тело'];
  const days=+a.days||3;const sched=getTrainingSchedule(days);
  const diw=dayOffset%7;const isRest=!sched[diw];
  if(isRest)return{rest:true,focus:'Отдых',exercises:[]};
  const seed=dayOffset;const pr=(s,i)=>((s*9301+49297+i*233)%233280)/233280;
  const ec={3:6,4:5,5:5,6:4}[days]||5;
  let ex=[],used=new Set();
  for(let i=0;i<ec;i++){let idx=Math.floor(pr(seed,i)*pool.length),att=0;while(used.has(idx)&&att<pool.length){idx=(idx+1)%pool.length;att++}used.add(idx);ex.push({...pool[idx],rest:getRestTime(pool[idx].weight)})}
  if(a.int==='low')ex=ex.map(e=>({...e,rest:e.rest+30}));
  if(a.int==='high')ex=ex.map(e=>({...e,r:e.r.replace('10-12','8-10').replace('12-15','10-12')}));
  if(a.exp==='beg')ex=ex.map(e=>({...e,s:Math.max(2,e.s-1)}));
  if(a.goal==='cut'||a.goal==='tone'){const ce=CARDIO[Math.floor(pr(seed,100)*CARDIO.length)];ex.push({n:ce.n,s:1,r:'15-20 мин',rest:getRestTime(ce.weight),m:'Кардио',isCardio:true,e:ce.e,t:ce.t,y:ce.y,startPos:ce.startPos,endPos:ce.endPos,weight:ce.weight})}
  return{rest:false,focus:foc[diw%foc.length],exercises:ex};
}

function genMetrics(qd){
  const a=qd||{};const w=+a.cw||70,h=+a.height||170,age=+a.age||30,g=a.gender||'male',goal=a.goal||'tone';
  const bmr=Math.round(10*w+6.25*h-5*age+(g==='female'?-161:5));
  const mult={sed:1.2,light:1.375,mod:1.55,high:1.725};
  const tdee=Math.round(bmr*(mult[a.act]||1.2));
  let gc='maintain',tc=tdee;
  if(goal==='cut'){gc='lose';tc=Math.round(tdee*0.85)}
  else if(goal==='gain'){gc='gain';tc=Math.round(tdee*1.125)}
  const tw=gc==='lose'?w-10:gc==='gain'?w+5:w;
  const p=Math.round(tw*(g==='female'?1.8:2.0)),f=Math.round(tw*0.9),c=Math.max(0,Math.round((tc-p*4-f*9)/4));
  return{bmr,tdee,targetCalories:tc,goalCategory:gc,protein:p,fats:f,carbs:c};
}

function genMeals(qd){
  const metrics=genMetrics(qd);
  const pick=(arr,t)=>arr.reduce((b,c)=>Math.abs(c.kcal-t)<Math.abs(b.kcal-t)?c:b,arr[0]);
  const tg={breakfast:Math.round(metrics.targetCalories*0.3),lunch:Math.round(metrics.targetCalories*0.4),dinner:Math.round(metrics.targetCalories*0.25),snack:Math.round(metrics.targetCalories*0.05)};
  const result={
    breakfast:{sel:{...pick(MEALS.breakfast,tg.breakfast),portion:100},opts:MEALS.breakfast.map(m=>({...m,portion:100}))},
    lunch:{sel:{...pick(MEALS.lunch,tg.lunch),portion:100},opts:MEALS.lunch.map(m=>({...m,portion:100}))},
    dinner:{sel:{...pick(MEALS.dinner,tg.dinner),portion:100},opts:MEALS.dinner.map(m=>({...m,portion:100}))},
    snack:{sel:{...pick(MEALS.snack,tg.snack),portion:100},opts:MEALS.snack.map(m=>({...m,portion:100}))}

}

function handleFileUpload(e){
  const files=Array.from(e.target.files);if(!files.length)return;
  files.forEach(file=>{
    if(!file.type.startsWith('audio/'))return;
    const reader=new FileReader();
    reader.onload=function(ev){
      const track={id:Date.now()+Math.random(),name:file.name.replace(/\.[^/.]+$/,''),duration:0,data:ev.target.result};
      const tempAudio=new Audio(ev.target.result);
      tempAudio.addEventListener('loadedmetadata',()=>{
        track.duration=tempAudio.duration;
        if(!S.user.tracks)S.user.tracks=[];
        S.user.tracks.push(track);save();renderMusicTab();toast('🎵 Трек добавлен: '+track.name);
      });
    };
    reader.readAsDataURL(file);
  });
}

  if(q.type==='n'){const val=S.ans[q.k]||'';body='<input type="number" class="inp" id="qnum" min="'+q.min+'" max="'+q.max+'" placeholder="'+q.p+'" value="'+val+'">';if(q.h)body+='<div class="sm muted" style="margin-top:-8px;margin-bottom:16px">'+q.h+'</div>'}
  else{body='<div>';q.o.forEach(o=>{const sel=S.ans[q.k]===o.v?'sel':'';body+='<label class="chip '+sel+'" data-v="'+o.v+'"><input type="radio" name="'+q.k+'" value="'+o.v+'" '+(sel?'checked':'')+'><span style="font-size:24px">'+o.e+'</span><span>'+o.t+'</span></label>'});body+='</div>'}
  const last=S.step===QS.length-1;
  return'<div class="card"><div class="prog"><div class="prog-f" style="width:'+pct+'%"></div></div>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)">'+
    '<div style="background:var(--grad);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px">'+(S.step+1)+'</div>'+
    '<div style="font-size:18px;font-weight:700">'+q.t+'</div></div>'+body+
    '<div class="flex jb" style="gap:12px;margin-top:24px">'+
    (S.step>0?'<button class="btn btn-g btn-s" onclick="S.step--;go()">← Назад</button>':'<div></div>')+
    '<button class="btn btn-fire" id="btn-next-quiz" '+(valid()?'':'disabled')+' onclick="handleNextStep()">'+(last?'🔥 Далее: Регистрация':'🔥 Далее →')+'</button></div></div>';
}

function valid(){
  const q=QS[S.step];let ok=false;
  if(q.type==='n'){const v=parseFloat(S.ans[q.k]);ok=!isNaN(v)&&v>=q.min&&v<=q.max;if(q.k==='tw'&&S.ans.cw)ok=ok&&Math.abs(v-parseFloat(S.ans.cw))<=50}
  else{ok=!!S.ans[q.k]}return ok;
}
function updateNextBtnState(){const btn=document.getElementById('btn-next-quiz');if(btn)btn.disabled=!valid()}
function handleNextStep(){if(valid()){if(S.step<QS.length-1){S.step++;go()}else{S.view='reg';go()}}}

function bQuiz(){
  document.querySelectorAll('.chip').forEach(ch=>{ch.onclick=function(){
    S.ans[QS[S.step].k]=this.getAttribute('data-v');
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
    this.classList.add('sel');this.querySelector('input').checked=true;updateNextBtnState();
  }});
  const ni=document.getElementById('qnum');
  if(ni)ni.addEventListener('input',function(){S.ans[QS[S.step].k]=this.value;updateNextBtnState()});
  updateNextBtnState();
}

window.doRegister=function(){
  try{
    const fnInput=document.getElementById('rfname');const emInput=document.getElementById('remail');
    if(!fnInput||!emInput){toast('❌ Ошибка интерфейса');return}
    const fn=fnInput.value.trim();const em=emInput.value.trim();
    if(!fn){toast('⚠️ Введите имя!');fnInput.focus();return}
    toast('⏳ Создание профиля...');
    S.user={firstName:fn,email:em,streak:0,totalWorkouts:0,lastWorkoutDate:null,
      workoutHistory:[],waterToday:0,waterDate:new Date().toDateString(),waterStreak:0,
      achievements:[],trialStart:Date.now(),trialAccepted:false,
      quizData:S.ans?{...S.ans}:{},reminders:{workout:{enabled:true,time:'09:00'},water:{enabled:true}},
      mealsSelected:{},mealsPortions:{},tracks:[],xp:0,fitCoins:0,avatar:null,
      earlyWorkouts:0,lateWorkouts:0,lastPlanUpdate:new Date().toDateString()};
    save();toast('🎉 Профиль создан!');S.view='dash';S.tab='workout';

};

function startWorkout(dayIndex){
  const u=S.user;const today=new Date();today.setHours(0,0,0,0);
  const date=new Date(today.getTime()+dayIndex*DAY_MS);
  const workout=genDayWorkout(dayIndex,u.quizData);
  if(!workout||workout.rest||workout.exercises.length===0){toast('⚠️ Нет упражнений');return}
  workoutState={dayIndex:dayIndex,dayName:DAY_NAMES[date.getDay()===0?6:date.getDay()-1],focus:workout.focus,
    exercises:workout.exercises,currentEx:0,currentSet:1,phase:'exercise',restTime:0,restDuration:150,
    completedSets:0,skippedExercises:0,startTime:Date.now()};
  renderWorkoutMode();
}

function startRestTimer(){
  if(workoutTimer)clearInterval(workoutTimer);
  const ex=workoutState.exercises[workoutState.currentEx];
  workoutState.restDuration=ex.rest||150;workoutState.restTime=workoutState.restDuration;updateRestTimerDisplay();
  workoutTimer=setInterval(()=>{
    workoutState.restTime--;updateRestTimerDisplay();
    if(workoutState.restTime<=0){clearInterval(workoutTimer);workoutTimer=null;playSound('complete');nextSet()}
  },1000);
}
function updateRestTimerDisplay(){
  const display=document.getElementById('rest-timer-display');if(display)display.textContent=formatTime(workoutState.restTime);
  const circ=2*Math.PI*90;const offset=circ*(1-workoutState.restTime/workoutState.restDuration);
  const fg=document.getElementById('rest-fg');if(fg)fg.style.strokeDashoffset=offset;
}
function playSound(type){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=type==='complete'?880:800;osc.type='sine';
    gain.gain.setValueAtTime(0.3,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.5);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.5)}catch(e){}
}
function completeSet(){workoutState.completedSets++;workoutState.currentSet++;workoutState.phase='confirm';renderWorkoutMode()}
function redoSet(){workoutState.currentSet--;workoutState.completedSets--;workoutState.phase='exercise';renderWorkoutMode()}
function confirmSet(){const ws=workoutState;const ex=ws.exercises[ws.currentEx];if(ws.currentSet<=ex.s){ws.phase='rest';renderWorkoutMode()}else{nextExercise()}}
function nextSet(){const ws=workoutState;const ex=ws.exercises[ws.currentEx];if(ws.currentSet<ex.s){ws.phase='rest';renderWorkoutMode()}else{nextExercise()}}
function skipExercise(){workoutState.skippedExercises++;workoutState.currentEx++;workoutState.currentSet=1;
  if(workoutState.currentEx>=workoutState.exercises.length){workoutState.phase='complete';playSound('complete');renderWorkoutMode()}
  else{workoutState.phase='exercise';renderWorkoutMode()}}
function nextExercise(){const ws=workoutState;ws.currentEx++;ws.currentSet=1;
  if(ws.currentEx>=ws.exercises.length){ws.phase='complete';playSound('complete');renderWorkoutMode()}
  else{ws.phase='exercise';renderWorkoutMode()}}
function skipRest(){if(workoutTimer)clearInterval(workoutTimer);workoutTimer=null;nextSet()}
function exitWorkout(){if(confirm('Выйти из тренировки?')){if(workoutTimer)clearInterval(workoutTimer);workoutTimer=null;workoutState=null;document.getElementById('workout-mode').innerHTML=''}}
function finishWorkout(){

    '<div class="macros" id="mc-'+cat+'"><span class="pill pill-k">🔥 '+cur.kcal+' ккал</span><span class="pill pill-p">🥩 '+cur.p+'г</span><span class="pill pill-f">🥑 '+cur.f+'г</span><span class="pill pill-c">🍚 '+cur.c+'г</span></div>'+
    '<div style="display:flex;align-items:center;gap:12px;margin-top:12px;padding:12px;background:var(--bg);border-radius:12px">'+
    '<label class="sm muted">Порция:</label><input type="range" min="80" max="120" value="'+s.portion+'" oninput="updPortion(\''+cat+'\',this.value)" style="flex:1;accent-color:var(--v)">'+

function regenM(cat){

function rProg(){

function togW(i){

  h+='<div class="card"><h3 style="margin-bottom:16px">📅 Дней тренировок в неделю</h3>'+
    '<p class="sm muted" style="margin-bottom:16px">Сейчас: <strong>'+daysPerWeek+' дней</strong></p>'+
    '<div class="chip '+(daysPerWeek===3?'sel':'')+'" onclick="changeDays(3)"><span style="font-size:24px">3️⃣</span><div><div style="font-weight:600">3 дня</div><div class="xs muted">Пн/Ср/Пт</div></div></div>'+
    '<div class="chip '+(daysPerWeek===4?'sel':'')+'" onclick="changeDays(4)"><span style="font-size:24px">4️⃣</span><div><div style="font-weight:600">4 дня</div><div class="xs muted">Пн/Ср/Пт/Вс</div></div></div>'+
    '<div class="chip '+(daysPerWeek===5?'sel':'')+'" onclick="changeDays(5)"><span style="font-size:24px">5️⃣</span><div><div style="font-weight:600">5 дней</div><div class="xs muted">Пн/Вт/Чт/Пт/Вс</div></div></div>'+
    '<div class="chip '+(daysPerWeek===6?'sel':'')+'" onclick="changeDays(6)"><span style="font-size:24px">6️⃣</span><div><div style="font-weight:600">6 дней</div><div class="xs muted">Пн-Сб</div></div></div></div>';

  h+='<div class="card"><h3 style="margin-bottom:16px">🎨 Тема оформления</h3>'+
    '<div class="theme-toggle" onclick="toggleTheme()"><span class="theme-toggle-icon">'+(theme==='dark'?'🌙':'☀️')+'</span>'+
    '<span class="theme-toggle-label">'+(theme==='dark'?'Тёмная тема':'Светлая тема')+'</span></div></div>';

  h+='<div class="card"><h3 style="margin-bottom:16px">🔔 Напоминания</h3>'+
    '<div class="reminder-card"><div class="flex ic gap"><div class="reminder-icon">🏋️</div>'+
    '<div class="reminder-info"><div class="reminder-title">Напоминание о тренировке</div><div class="reminder-desc">Ежедневное напоминание в выбранное время</div></div>'+
    '<div class="reminder-toggle '+(reminders.workout.enabled?'on':'')+'" onclick="toggleReminder(\'workout\')"></div></div>'+
    '<div class="time-slots">';
  ['08:00','09:00','10:00','12:00','13:00','14:00','16:00','18:00','19:00','20:00','21:00','22:00'].forEach(t=>{
    h+='<div class="time-slot '+(reminders.workout.time===t?'sel':'')+'" onclick="setReminderTime(\'workout\',\''+t+'\')">'+t+'</div>';
  });
  h+='</div></div>';

  h+='<div class="reminder-card"><div class="flex ic gap"><div class="reminder-icon">💧</div>'+
    '<div class="reminder-info"><div class="reminder-title">Напоминание о воде</div><div class="reminder-desc">Каждые 2 часа (8:00-22:00)</div></div>'+
    '<div class="reminder-toggle '+(reminders.water.enabled?'on':'')+'" onclick="toggleReminder(\'water\')"></div></div></div></div>';

  if(info.isLifetime){
    h+='<div class="card" style="border-color:var(--gold);background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(245,158,11,.05))"><div class="sm muted" style="margin-bottom:4px">Текущий тариф</div>'+
      '<div style="font-weight:700;color:var(--gold);font-size:16px">💎 Навсегда</div>'+
      '<p class="sm" style="margin-top:8px;color:var(--text)">Безграничное количество тренировок</p></div>';
  }else{
    h+='<div class="card"><div style="background:var(--bg2);padding:14px;border-radius:12px;margin-bottom:16px"><div class="sm muted" style="margin-bottom:4px">Текущий тариф</div>'+
      '<div style="font-weight:700;color:var(--fire)">'+typeLabels[info.type]+'</div></div>'+
      '<button class="btn btn-fire" style="margin-bottom:12px" onclick="S.view=\'pay\';go()">🔥 Управление подпиской</button>'+
      '<button class="btn btn-err" onclick="reset()">🚪 Сбросить все данные</button></div>';
  }
  return h;
}

function toggleEditProfile(){S.editingProfile=!S.editingProfile;go()}
function toggleEditMetrics(){S.editingMetrics=!S.editingMetrics;go()}
function saveProfileEdit(){
  try{const fi=document.getElementById('edit-fname');if(!fi){toast('❌ Ошибка');return}
    const nf=fi.value.trim();if(!nf){toast('⚠️ Имя не может быть пустым!');fi.focus();return}
    S.user.firstName=nf;S.editingProfile=false;save();toast('✅ Профиль обновлён!');go()}
  catch(e){toast('❌ Ошибка: '+e.message)}
}
function saveMetricsEdit(){
  try{const cw=+document.getElementById('edit-cw').value;const tw=+document.getElementById('edit-tw').value;
    const height=+document.getElementById('edit-height').value;const age=+document.getElementById('edit-age').value;
    const goal=document.getElementById('edit-goal').value;
    if(!cw||!tw||!height||!age){toast('⚠️ Заполните все поля!');return}
    if(Math.abs(tw-cw)>50){toast('⚠️ Желаемый вес должен отличаться не более чем на 50 кг!');return}
    S.user.quizData.cw=cw;S.user.quizData.tw=tw;S.user.quizData.height=height;S.user.quizData.age=age;S.user.quizData.goal=goal;
    S.editingMetrics=false;save();toast('✅ Показатели обновлены!');go()}
  catch(e){toast('❌ Ошибка: '+e.message)}
}
function changeDays(days){S.user.quizData.days=days;save();toast('✅ Обновлено: '+days+' дней');go()}
function setReminderTime(type,time){
  if(!S.user.reminders)S.user.reminders={workout:{enabled:true,time:'09:00'},water:{enabled:true}};
  S.user.reminders[type].time=time;save();setupReminders();toast('✅ Время: '+time);go();
}
function toggleTheme(){
  const current=localStorage.getItem('theme')||'dark';
  const newTheme=current==='dark'?'light':'dark';
  localStorage.setItem('theme',newTheme);
  document.documentElement.setAttribute('data-theme',newTheme);
  go();
}
function toggleReminder(type){
  if(!S.user.reminders)S.user.reminders={workout:{enabled:true,time:'09:00'},water:{enabled:true}};
  S.user.reminders[type].enabled=!S.user.reminders[type].enabled;save();setupReminders();
  toast(S.user.reminders[type].enabled?'✅ Включено':'❌ Выключено');go();
}
function setupReminders(){
  Object.values(reminderIntervals).forEach(interval=>clearInterval(interval));reminderIntervals={};
  if(!S.user||!S.user.reminders)return;
  reminderIntervals.workout=setInterval(()=>{
    const now=new Date();const currentTime=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    if(S.user.reminders.workout.enabled&&currentTime===S.user.reminders.workout.time){
      if(Notification.permission==='granted'){new Notification('🏋️ Время тренировки!')}
      else{toast('🏋️ Время тренировки!')}}
  },60000);
  reminderIntervals.water=setInterval(()=>{
    const now=new Date();const hour=now.getHours();const minute=now.getMinutes();
    if(S.user.reminders.water.enabled&&hour%2===0&&minute===0&&hour>=8&&hour<=22){
      if(Notification.permission==='granted'){new Notification('💧 Время пить воду!')}
      else{toast('💧 Время пить воду!')}}
  },60000);
}
function redeemReward(id,cost){
  if(!S.user||!confirm('Потратить '+cost+' FitCoins?'))return;
  if((S.user.fitCoins||0)<cost){toast('❌ Недостаточно FitCoins');return}
  S.user.fitCoins-=cost;
  if(!S.user.redeemedRewards)S.user.redeemedRewards=[];
  S.user.redeemedRewards.push({id,date:Date.now()});
  if(id==='free_week'&&S.user.subscription){S.user.subscription.unlockDate+=7*DAY_MS}
  else if(id==='free_month'&&S.user.subscription){S.user.subscription.unlockDate+=30*DAY_MS}
  save();toast('🎉 Награда получена!');go();
}
function exportPlan(){window.print();toast('📄 План экспортирован!')}
function bDash(){document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{S.tab=t.dataset.t;go()}})}
function toast(msg){
  const r=document.getElementById('toast');
  r.innerHTML='<div class="toast"><span style="font-size:20px">✅</span><span style="font-size:14px;font-weight:500">'+msg+'</span></div>';
  setTimeout(()=>r.querySelector('.toast')?.classList.add('show'),10);
  setTimeout(()=>{const t=r.querySelector('.toast');if(t){t.classList.remove('show');setTimeout(()=>r.innerHTML='',300)}},3000);
}
function daysLeft(ts){return Math.max(0,Math.ceil((ts+TRIAL-Date.now())/DAY_MS))}
function checkDailyUpdate(){if(!S.user)return;const today=new Date().toDateString();
  if(S.user.lastPlanUpdate!==today){S.user.lastPlanUpdate=today;save();toast('🔄 План обновлён!');go()}}
setInterval(checkDailyUpdate,60000);

const savedTheme=localStorage.getItem('theme')||'dark';
document.documentElement.setAttribute('data-theme',savedTheme);
if('Notification' in window&&Notification.permission==='default'){Notification.requestPermission()}

load();initMusicPlayer();
if(S.user){S.view='dash';S.tab='workout';setupReminders()}
go();
</script>

<div id="mini-player" class="mini-player hidden">
  <button class="music-btn" style="width:40px;height:40px;font-size:16px" onclick="togglePlay()">▶</button>
  <div class="mini-track-info">
    <div class="mini-track-name" id="mini-track-name">Нет трека</div>
    <div class="mini-track-artist" id="mini-track-artist">0:00</div>
    <div class="mini-progress" onclick="seekAudio(event)"><div class="mini-progress-fill"></div></div>
  </div>
</div>
</body>
</html>
